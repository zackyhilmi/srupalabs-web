<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF9F6;
  --white:#ffffff;
  --dark:#111110;
  --muted:#9B9B97;
  --border:#E8E8E6;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',sans-serif;
}
html{-webkit-font-smoothing:antialiased}

body{
  background:var(--bg);
  color:var(--dark);
  font-family:var(--sans);
  min-height:100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:3rem 1.25rem 4rem;
}

.container{
  width:100%;
  max-width:420px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
}

/* ── AVATAR ── */
.avatar-wrap{
  margin-bottom:1.25rem;
  animation:fadeUp .5s ease both;
}
.avatar{
  width:88px;height:88px;border-radius:50%;
  overflow:hidden;border:2px solid var(--border);
  background:var(--white);
}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}

/* ── NAME ── */
.name{
  font-family:var(--serif);
  font-size:1.5rem;font-weight:400;
  color:var(--dark);
  margin-bottom:.35rem;
  animation:fadeUp .5s .08s ease both;
}

/* ── BIO ── */
.bio{
  font-size:.82rem;color:var(--muted);
  text-align:center;line-height:1.6;
  max-width:28ch;
  margin-bottom:2rem;
  animation:fadeUp .5s .12s ease both;
}

/* ── LINKS ── */
.links{
  width:100%;
  display:flex;flex-direction:column;gap:.75rem;
}

.link-btn{
  display:flex;align-items:center;gap:.9rem;
  width:100%;
  padding:.9rem 1.1rem;
  background:var(--white);
  border:1px solid var(--border);
  border-radius:12px;
  text-decoration:none;color:var(--dark);
  font-family:var(--sans);font-size:.88rem;font-weight:500;
  transition:transform .18s cubic-bezier(.32,.72,0,1),
             box-shadow .18s,
             border-color .18s;
  position:relative;overflow:hidden;
}
.link-btn::before{
  content:'';position:absolute;inset:0;
  background:var(--dark);
  transform:translateX(-100%);
  transition:transform .22s cubic-bezier(.32,.72,0,1);
  z-index:0;
}
.link-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.08);
  border-color:#ccc;
}
.link-btn:hover::before{transform:translateX(0)}
.link-btn:hover .link-label{color:var(--white)}
.link-btn:hover .link-icon-wrap{background:rgba(255,255,255,.12)}
.link-btn:hover .link-arrow{color:rgba(255,255,255,.5)}
.link-btn:active{transform:translateY(0);transition-duration:.08s}

.link-icon-wrap{
  width:36px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;z-index:1;
  transition:background .22s;
}
.link-label{
  flex:1;position:relative;z-index:1;
  transition:color .22s;
}
.link-arrow{
  color:var(--muted);font-size:.8rem;
  position:relative;z-index:1;
  transition:color .22s, transform .18s;
}
.link-btn:hover .link-arrow{transform:translate(2px,-2px)}

/* icon colors */
.icon-ig{background:#fce7f3}
.icon-wa{background:#dcfce7}
.icon-shopee{background:#fee2e2}
.icon-tiktok{background:#f1f0ff}
.icon-web{background:#faf9f6;border:1px solid var(--border)}

/* ── WEBSITE CARD (special) ── */
.link-btn.featured{
  background:var(--dark);
  border-color:var(--dark);
}
.link-btn.featured .link-label{color:var(--white)}
.link-btn.featured .link-arrow{color:rgba(255,255,255,.4)}
.link-btn.featured .icon-web{background:rgba(255,255,255,.08);border-color:transparent}
.link-btn.featured::before{display:none}
.link-btn.featured:hover{
  background:#222;
  border-color:#222;
  box-shadow:0 8px 24px rgba(0,0,0,.2);
}
.link-btn.featured:hover .link-label{color:var(--white)}
.link-btn.featured .link-desc{
  display:block;
  font-size:.72rem;
  font-weight:300;
  color:rgba(255,255,255,.45);
  margin-top:.15rem;
  line-height:1.4;
}

.link-label-wrap{flex:1;position:relative;z-index:1;transition:color .22s}
.link-label-wrap .link-label{display:block}

/* ── FOOTER ── */
.footer{
  margin-top:2.5rem;
  font-size:.7rem;color:var(--muted);
  letter-spacing:.04em;
  animation:fadeUp .5s .4s ease both;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:none}
}
.links .link-btn:nth-child(1){animation:fadeUp .45s .16s ease both}
.links .link-btn:nth-child(2){animation:fadeUp .45s .22s ease both}
.links .link-btn:nth-child(3){animation:fadeUp .45s .28s ease both}
.links .link-btn:nth-child(4){animation:fadeUp .45s .34s ease both}
.links .link-btn:nth-child(5){animation:fadeUp .45s .40s ease both}
</style>
</head>
